spring.application.name=product-management-system

# ================================
# Server Configuration
# ================================
server.port=8088

# ================================
# Database Configuration
# ================================
spring.datasource.url=jdbc:mysql://localhost:3306/product-database
spring.datasource.username=root
spring.datasource.password=root@12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================================
# JPA / Hibernate
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ================================
# JWT Configuration
# ================================
app.jwt.secret=your_super_secret_key_should_be_at_least_256_bits_long_for_hs256
app.jwt.expiration-ms=86400000
app.jwt.refresh-token.expiration-ms=604800000
app.jwt.header=Authorization
app.jwt.prefix=Bearer 

# ================================
# Spring Security
# ================================
spring.security.user.name=admin
spring.security.user.password=admin123